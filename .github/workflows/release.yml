name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    name: Build for ${{ matrix.os }} (${{ matrix.arch }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            arch: amd64
            artifact_name: roku-tui
            asset_name: roku-tui-linux-amd64
          - os: windows-latest
            arch: amd64
            artifact_name: roku-tui.exe
            asset_name: roku-tui-windows-amd64.exe
          - os: macos-14
            arch: universal
            artifact_name: roku-tui
            asset_name: roku-tui-macos-universal

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
          version: "latest"

      - name: Install dependencies
        run: |
          uv sync
          uv pip install pyinstaller

      - name: Build with PyInstaller
        run: |
          if [[ "${{ matrix.os }}" == macos-* ]]; then
            echo "Building universal2 binary for macOS..."
            
            # 1. Build for arm64 (native)
            echo "Building arm64 slice..."
            uv run pyinstaller roku_tui.spec --workpath build-arm64 --clean
            mv dist/roku-tui dist/roku-tui-arm64
            
            # 2. Build for x86_64
            echo "Building x86_64 slice..."
            uv python install cpython-3.12-macos-x86_64-none
            uv venv .venv-x86_64 --python cpython-3.12-macos-x86_64-none
            uv pip install --python .venv-x86_64/bin/python . pyinstaller --python-platform x86_64-apple-darwin
            # Run pyinstaller under x86_64 emulation to ensure x86_64 collection
            arch -x86_64 .venv-x86_64/bin/pyinstaller roku_tui.spec --workpath build-x86_64 --clean
            mv dist/roku-tui dist/roku-tui-x86_64
            
            # 3. Combine into a universal binary
            echo "Combining slices with lipo..."
            lipo -create dist/roku-tui-arm64 dist/roku-tui-x86_64 -output dist/roku-tui
            rm dist/roku-tui-arm64 dist/roku-tui-x86_64
          else
            uv run pyinstaller roku_tui.spec
          fi
        shell: bash

      - name: Rename artifact
        run: mv dist/${{ matrix.artifact_name }} dist/${{ matrix.asset_name }}
        shell: bash

      - name: Upload temporary artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.asset_name }}
          path: dist/${{ matrix.asset_name }}
          retention-days: 1

  release:
    name: Create GitHub Release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
