name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    name: Build for ${{ matrix.os }} (${{ matrix.arch }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            arch: amd64
            artifact_name: roku-tui
            asset_name: roku-tui-linux-amd64
          - os: windows-latest
            arch: amd64
            artifact_name: roku-tui.exe
            asset_name: roku-tui-windows-amd64.exe
          - os: macos-14
            arch: universal
            artifact_name: roku-tui
            asset_name: roku-tui-macos-universal

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
          version: "latest"

      - name: Install dependencies (macOS)
        if: startsWith(matrix.os, 'macos-')
        run: |
          uv venv
          # Force universal2 wheels where available
          uv pip install . pyinstaller --only-binary :all: --python-platform macos

      - name: Install dependencies (Other)
        if: "!startsWith(matrix.os, 'macos-')"
        run: |
          uv sync
          uv pip install pyinstaller

      - name: Build with PyInstaller
        run: |
          uv run pyinstaller roku_tui.spec

      - name: Rename artifact
        run: mv dist/${{ matrix.artifact_name }} dist/${{ matrix.asset_name }}
        shell: bash

      - name: Upload temporary artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.asset_name }}
          path: dist/${{ matrix.asset_name }}
          retention-days: 1

  release:
    name: Create GitHub Release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
